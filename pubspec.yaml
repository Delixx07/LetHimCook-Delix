name: tes_1
description: "LetHimCook - Interactive Recipe Book & AI Cooking Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Database & State Management
  drift: ^2.13.0
  drift_flutter: ^0.2.7
  sqlite3_flutter_libs: ^0.5.24
  flutter_riverpod: ^2.4.0
  
  # Navigation
  go_router: ^12.1.0
  
  # UI & Design
  flutter_staggered_grid_view: ^0.7.0
  
  # Utilities
  wakelock_plus: ^1.2.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.13.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/nasi_goreng.jpg
    - assets/images/ayam_bakar.jpg
    - assets/images/gado_gado.jpg
    - assets/images/soto_ayam.jpg
    - assets/images/es_teler.jpg

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
